<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>审计</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <style>body { min-height: auto; padding: 22px 24px; }</style>
</head>
<body>
<div id="content"></div>
<script src="/static/js/jquery/jquery-3.6.0.min.js"></script>
<script src="/static/layui/layui.js"></script>
<script src="/static/js/app.js"></script>
<script>
if (NATT.requireAuth()) {
    NATT.request("GET", "/audit-logs?page=1&page_size=50").then(function (p) {
        var rows = (p.items || []).map(function (x) {
            return '<tr><td>' + NATT.escapeHtml(x.created_at) + '</td><td>' + NATT.escapeHtml(x.actor) + '</td><td>' + NATT.escapeHtml(x.action) + '</td><td>' + NATT.escapeHtml(x.content) + '</td><td>' + NATT.escapeHtml(x.ip) + '</td></tr>';
        }).join("");
        $("#content").html('<div class="panel"><h3>审计日志</h3><table class="data-table"><thead><tr><th>时间</th><th>操作人</th><th>动作</th><th>内容</th><th>IP</th></tr></thead><tbody>' + rows + '</tbody></table></div>');
    }).fail(NATT.showError);
}
</script>
</body>
</html>
