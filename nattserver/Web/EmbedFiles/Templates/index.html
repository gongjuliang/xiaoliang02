<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NATT Server</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .console-frame { width: 100%; height: 100%; border: 0; background: #f4f7fb; }
        .content { padding: 0; overflow: hidden; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark">NS</div>
            <div>
                <strong>NATT Server</strong>
                <span>TCP Tunnel Admin</span>
            </div>
        </div>
        <nav id="nav" class="nav-list">
            <button data-view="dashboard" data-src="/dashboard.html" type="button">仪表盘</button>
            <button data-view="tunnels" data-src="/tunnels.html" type="button">隧道</button>
            <button data-view="config" data-src="/config.html" type="button">配置</button>
            <button data-view="mcp" data-src="/mcp.html" type="button">MCP</button>
            <button data-view="audit" data-src="/audit.html" type="button">审计</button>
        </nav>
    </aside>
    <main class="main-panel">
        <header class="topbar">
            <div>
                <h2 id="viewTitle">仪表盘</h2>
                <span id="viewSubTitle">运行概览</span>
            </div>
            <div class="top-actions">
                <button id="refreshBtn" class="layui-btn secondary" type="button">刷新</button>
                <button id="logoutBtn" class="layui-btn ghost" type="button">退出</button>
            </div>
        </header>
        <section class="content">
            <iframe id="mainFrame" class="console-frame" src="/dashboard.html"></iframe>
        </section>
    </main>
</div>
<script src="/static/js/jquery/jquery-3.6.0.min.js"></script>
<script src="/static/layui/layui.js"></script>
<script src="/static/js/app.js"></script>
<script>
if (NATT.requireAuth()) {
    var activeViewKey = "natt_server_active_view";
    var titles = {
        dashboard: ["仪表盘", "运行概览"],
        tunnels: ["隧道", "公网监听与秘钥绑定"],
        config: ["配置", "热加载与重启项"],
        mcp: ["MCP", "AI 工具访问控制"],
        audit: ["审计", "管理操作记录"]
    };
    function activate(btn) {
        if (!btn || !btn.length) btn = $('#nav [data-view="dashboard"]');
        var view = btn.data("view") || "dashboard";
        var src = btn.data("src") || "/dashboard.html";
        var title = titles[view] || ["控制台", ""];
        $("#nav button").removeClass("active");
        btn.addClass("active");
        $("#viewTitle").text(title[0]);
        $("#viewSubTitle").text(title[1]);
        sessionStorage.setItem(activeViewKey, view);
        $("#mainFrame").attr("src", src);
    }
    $("#nav").on("click", "button[data-src]", function () { activate($(this)); });
    $("#refreshBtn").on("click", function () {
        document.getElementById("mainFrame").contentWindow.location.reload();
    });
    $("#logoutBtn").on("click", function () {
        sessionStorage.removeItem(activeViewKey);
        NATT.logout();
    });
    var savedView = sessionStorage.getItem(activeViewKey) || "dashboard";
    var savedBtn = $('#nav [data-view="' + savedView + '"]');
    activate(savedBtn.length ? savedBtn : $('#nav [data-view="dashboard"]'));
}
</script>
</body>
</html>
