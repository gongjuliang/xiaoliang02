<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小良内网穿透-服务端</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body data-page="login">
<div id="loginView" class="login-view">
    <form id="loginForm" class="login-panel">
        <div class="brand-block">
            <img class="brand-mark" src="/static/img/gongjuliang.png" alt="工具人小良">
            <div>
                <h1>小良内网穿透-服务端</h1>
                <p>服务端管理后台</p>
            </div>
        </div>
        <label class="field">
            <span>账号</span>
            <input name="username" autocomplete="username">
        </label>
        <label class="field" style="margin-bottom: 0px;">
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password">
            <div style="text-align:right;margin-top:4px;">
                <a href="/resetpwd.html" style="font-size:12px;color:#1E9FFF;">忘记密码</a>
            </div>
        </label>
        <label class="field">
            <span>验证码</span>
            <div class="captcha-row">
                <input name="captcha_code" autocomplete="off" placeholder="请输入验证码结果">
                <button id="captchaRefresh" class="layui-btn layui-btn-primary" type="button">刷新</button>
            </div>
            <img id="captchaImage" class="captcha-image" alt="验证码图片">
        </label>
        <label class="check-row terms-row">
            <input name="agree_terms" type="checkbox">
            <span>已阅读并同意<a href="/agreement.html" target="_blank" rel="noopener" style="color:blue;">《用户协议》</a></span>
        </label>
        <button class="layui-btn primary full" type="submit">登录</button>
        <div id="loginError" class="form-error"></div>
        <div style="text-align:center;margin-top:16px;font-size:12px;color:#999;">
            版权属于工具人小良(<a href="https://www.gongjuliang.com" target="_blank" rel="noopener" style="color:#1E9FFF;">www.gongjuliang.com</a>)
        </div>
    </form>
</div>
<script src="/static/js/jquery/jquery-3.6.0.min.js"></script>
<script src="/static/layui/layui.js"></script>
<script src="/static/js/sm2.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
