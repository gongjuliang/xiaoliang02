<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NATT Client</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body data-page="login">
<div id="loginView" class="login-view">
    <form id="loginForm" class="login-panel">
        <div class="brand-block">
            <div class="brand-mark">NC</div>
            <div>
                <h1>NATT Client</h1>
                <p>内网穿透客户端管理后台</p>
            </div>
        </div>
        <label class="field">
            <span>账号</span>
            <input name="username" autocomplete="username" value="admin">
        </label>
        <label class="field">
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password">
        </label>
        <button class="layui-btn primary full" type="submit">登录</button>
        <div id="loginError" class="form-error"></div>
    </form>
</div>
<script src="/static/js/jquery/jquery-3.6.0.min.js"></script>
<script src="/static/layui/layui.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
